name: on-track-hockey
services:
  api:
    build:
      context: ../backend
    restart: unless-stopped
    environment:
      OTH_DB_DSN: ${OTH_DB_DSN}
    networks:
      - oth-net
    ports:
      - 3000:3000

  db:
    image: "postgres:18.1"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - oth-net
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
  migrate:
    image: migrate/migrate:v4.19.1
    networks:
      - oth-net
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend/migrations:/migrations
    command: [ "-path", "/migrations", "-database", "${OTH_DB_DSN}", "up" ]

networks:
  oth-net:
    driver: bridge
volumes:
  postgres-data:
    name: "postgres-data"
